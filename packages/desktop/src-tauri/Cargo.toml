[package]
name = "app"
version = "0.1.0"
description = "Loupe — poste de travail de transcription musicale"
authors = ["Ivan Duchauffour"]
license = "UNLICENSED"
repository = "https://github.com/IIIvan37/loupe"
edition = "2021"
rust-version = "1.77.2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.6.3", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.11.3", features = [] }
tauri-plugin-log = "2"
tauri-plugin-deep-link = "2.4.9"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-single-instance = "2"
tauri-plugin-window-state = "2"
tokio = { version = "1", features = ["process", "io-util", "time", "rt", "macros", "sync"] }
url = "2"
ureq = "3"
sha2 = "0.10"
hex = "0.4"
