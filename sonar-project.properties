# SonarCloud (SonarQube Cloud) — CI-based analysis, see .github/workflows/sonar.yml.
# Automatic Analysis MUST stay disabled on sonarcloud.io (the two modes conflict).
sonar.projectKey=IIIvan37_loupe
sonar.organization=iiivan37

sonar.projectName=loupe

# Our code only: the hexagonal core + web adapter, the Python server (pure
# modules + shells), the Modal composition and the Supabase Edge Function.
sonar.sources=packages/core/src,packages/web/src,server/app,server/modal_app.py,supabase/functions/mint-analyze-token

# Vendored third-party trees (BTC, SongFormer — analysed upstream, licences
# tierces) and generated catalogs are not ours to lint.
sonar.exclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,server/app/btc/**,server/app/songformer/**,packages/web/src/locales/**

# Colocated specs (vitest) + server pytest + Edge Function Deno tests.
sonar.tests=packages/core/src,packages/web/src,server/tests,supabase/functions/mint-analyze-token
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,server/tests/**

# Coverage produced by the sonar workflow before the scan.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.python.coverage.reportPaths=server/coverage.xml
sonar.python.version=3.12

sonar.sourceEncoding=UTF-8

# Triaged findings — each entry is a verified false positive or a documented,
# deliberate choice (see the code comments at each site). Config-as-code so the
# triage survives project re-imports and reviews travel with the PR.
sonar.issue.ignore.multicriteria=fp1,fp2,fp3,fp4,fp5,fp6,fp7,fp8,fp9,fp10,fp11
# fast-check property tests assert via fc.assert — not recognized by S2699;
# assertion quality is enforced harder by Stryker mutation testing anyway.
sonar.issue.ignore.multicriteria.fp1.ruleKey=typescript:S2699
sonar.issue.ignore.multicriteria.fp1.resourceKey=**/*.spec.ts*
# One `it` per fact is the repo's testing idiom (TDD skill) — parameterized
# tests would trade the per-fact names away.
sonar.issue.ignore.multicriteria.fp2.ruleKey=typescript:S5976
sonar.issue.ignore.multicriteria.fp2.resourceKey=**/*.spec.ts*
# Deno.test files — the TS analyzer doesn't know the Deno test runner.
sonar.issue.ignore.multicriteria.fp3.ruleKey=typescript:S2187
sonar.issue.ignore.multicriteria.fp3.resourceKey=supabase/functions/**/*.test.ts
# torch.load(weights_only=False) is required by the BTC checkpoint; weights are
# sha256-pinned from fixed URLs (see chords.py) — accepted risk, documented.
sonar.issue.ignore.multicriteria.fp4.ruleKey=python:S6985
sonar.issue.ignore.multicriteria.fp4.resourceKey=server/app/chords.py
# False positive: _audio_path validates the ref against ^[0-9a-f]{64}$ before
# any path join — the taint engine doesn't see the regex guard.
sonar.issue.ignore.multicriteria.fp5.ruleKey=pythonsecurity:S2083
sonar.issue.ignore.multicriteria.fp5.resourceKey=server/app/projects.py
# Deliberate middleware onion (network vetting BEFORE CORS) — documented at the
# add_middleware block in main.py.
sonar.issue.ignore.multicriteria.fp6.ruleKey=python:S8414
sonar.issue.ignore.multicriteria.fp6.resourceKey=server/app/main.py
# The waveform hooks suffix their INTERNAL setters with `State` because the
# hook exports a guarded public setter under the natural name — the naming
# symmetry S6754 wants would collide with the public API.
sonar.issue.ignore.multicriteria.fp7.ruleKey=typescript:S6754
sonar.issue.ignore.multicriteria.fp7.resourceKey=packages/web/src/app/waveform/use-*.ts
# role="img" + aria-label IS the recommended accessible pattern for a <canvas>
# graphic — an <img> cannot draw the waveform.
sonar.issue.ignore.multicriteria.fp8.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.fp8.resourceKey=packages/web/src/app/waveform/waveform-canvas.tsx
# event.returnValue is deprecated but some engines still require it to surface
# the native beforeunload prompt — commented at the site.
sonar.issue.ignore.multicriteria.fp9.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.fp9.resourceKey=packages/web/src/app/workstation-shell/use-unload-guard.ts
# `void analysis` reads the effect's premise so the dependency list stays
# honest — the work happens in the cleanup, commented at the site.
sonar.issue.ignore.multicriteria.fp10.ruleKey=typescript:S3735
sonar.issue.ignore.multicriteria.fp10.resourceKey=packages/web/src/app/tempo/use-count-in.ts
# A hook's boolean option (needsConfirm) is idiomatic React configuration,
# not a method selector to split.
sonar.issue.ignore.multicriteria.fp11.ruleKey=typescript:S2301
sonar.issue.ignore.multicriteria.fp11.resourceKey=packages/web/src/app/workstation-shell/use-drop-import.ts
