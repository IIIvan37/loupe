name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger for the deep tier (Windows gate, mutation) on any ref —
  # e.g. to verify a portability fix on a branch before merging.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm gate

  gate-windows:
    name: Quality gate (windows)
    # Deep tier, like mutation: the app ships a Windows desktop target (Tauri),
    # but the per-PR loop is not where that check earns its keep — Windows
    # runners are billed at 2× and are slow, and portability regressions are
    # rare. Runs post-merge on main, and on demand (workflow_dispatch) to
    # verify a portability fix on a branch. In the template this leg's very
    # first run caught a real bug: no .gitattributes meant CRLF checkouts,
    # failing Biome on every line.
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm gate

  server:
    name: Server (lint · types · tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: server/requirements-dev.txt
      # Torch-free by design: requirements-dev.txt omits the heavy ML stack, so
      # the run is fast and never downloads Demucs weights. The ML humble objects
      # (separation.py / tempo.py) are excluded from ruff-types/coverage and
      # exercised only via their absent-capability fallback.
      - run: python -m venv .venv
      - run: .venv/bin/pip install --upgrade pip
      - run: .venv/bin/pip install -r requirements-dev.txt
      - run: .venv/bin/ruff check app tests modal_app.py
      - run: .venv/bin/ruff format --check app tests modal_app.py
      - run: .venv/bin/pyright
      - run: .venv/bin/python -m pytest

  edge-functions:
    name: Edge Functions (deno check · lint · fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # No live stack: type-check + lint + format only. The only network access
      # is djwt from deno.land; the integration suite (index.test.ts) stays a
      # local-stack affair (see docs/j2-supabase-runbook.md).
      - run: deno check --config supabase/functions/deno.json supabase/functions/mint-analyze-token/*.ts
      - run: deno lint supabase/functions/mint-analyze-token/
      - run: deno fmt --check supabase/functions/mint-analyze-token/

  commitlint:
    name: Commit messages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: >
          pnpm exec commitlint
          --from "${{ github.event.pull_request.base.sha }}"
          --to "${{ github.event.pull_request.head.sha }}"
          --verbose

  mutation:
    name: Mutation testing (core)
    # Deep check — post-merge on main and on demand, to keep PRs to the fast
    # gate. (You also run it locally at each close-step, before opening the PR.)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # `incremental: true` in stryker.config.json only pays off if the state
      # file survives the run — otherwise every CI run mutates everything.
      - name: Restore Stryker incremental state
        uses: actions/cache@v6
        with:
          path: reports/stryker-incremental.json
          key: stryker-${{ github.sha }}
          restore-keys: stryker-

      - run: pnpm test:mutation

      # A score in a log line is not actionable; the HTML report shows which
      # mutants survived and where.
      - name: Upload the mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: reports/mutation
          retention-days: 14

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Dependabot handles the routine bumps; this fails the build on a known
      # high or critical advisory, which should not wait for a weekly PR.
      - run: pnpm audit --audit-level high
