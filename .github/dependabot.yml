version: 2

# Automated dependency maintenance. pnpm (lockfile v9) is handled natively by the
# "npm" ecosystem. Updates are grouped to limit PR noise (the toolchain is dense).
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"

  # CVE watch on the Python analysis stack (AA.1). The pins are deliberate
  # (upgrades are an operator action — Lot A.1); advisories notify without
  # auto-installing, which is exactly the missing piece: a strictly-pinned
  # torch/transformers/yt-dlp would otherwise never signal a CVE. yt-dlp in
  # particular parses hostile remote content by construction, and the same
  # stack runs on Modal. Limitation: the madmom git pin is invisible to
  # Dependabot — partial but real coverage.
  - package-ecosystem: pip
    directory: "/server"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
    groups:
      python-dependencies:
        update-types:
          - minor
          - patch
