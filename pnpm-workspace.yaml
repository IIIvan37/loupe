packages:
  - 'packages/*'

onlyBuiltDependencies:
  - esbuild

# Transitive advisories the `pnpm audit --audit-level high` CI job blocks on.
# Each override pins WITHIN the major the parent expects; drop it once
# `pnpm why <pkg>` shows a patched version natively.
# - fast-uri (via ajv < commitlint/stryker): host confusion,
#   GHSA-4c8g-83qw-93j6 + GHSA-v2hh-gcrm-f6hx — patched in 3.1.4.
# - brace-expansion (via minimatch < stryker): GHSA-3jxr-9vmj-r5cp — patched
#   in 5.0.7.
overrides:
  'fast-uri@>=3.0.0 <4.0.0': '^3.1.4'
  'brace-expansion@>=3.0.0 <5.0.7': '^5.0.7'
